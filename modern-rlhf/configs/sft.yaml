# configs/sft.yaml
# Stage 1: Supervised Fine-Tuning Configuration

experiment:
  name: "sft_qwen_0.5b"
  output_dir: "outputs"
  seed: 42

model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype: "float32"  # float32 for CPU, bfloat16 for GPU
  trust_remote_code: true

data:
  source: "toy"  # "toy" | "huggingface" | "json"
  # For huggingface:
  # dataset_name: "tatsu-lab/alpaca"
  # split: "train"
  # max_samples: 1000
  # text_column: "text"
  # For json:
  # json_path: "data/sft_data.json"
  max_length: 512

training:
  per_device_train_batch_size: 2
  learning_rate: 2.0e-5
  num_train_epochs: 2
  logging_steps: 1
  save_strategy: "epoch"
  report_to: "none"  # "wandb" for experiment tracking
  fp16: false
  gradient_accumulation_steps: 1
  warmup_ratio: 0.1

evaluation:
  test_prompts:
    - "Write a Python function to check if a number is even."
    - "Explain recursion with a real-life example."
  max_new_tokens: 100
  temperature: 0.7
