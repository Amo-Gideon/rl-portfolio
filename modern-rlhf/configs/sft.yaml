# configs/sft.yaml
# Stage 1: Supervised Fine-Tuning
# GPU: RTX 4090 24GB
# VRAM: ~12-16GB with LoRA + bfloat16

experiment:
  name: "sft_qwen_0.5b"
  output_dir: "outputs"
  seed: 42

model:
  name: "Qwen/Qwen2.5-0.5B-Instruct"
  torch_dtype: "bfloat16"
  trust_remote_code: true
  use_lora: true
  lora:
    r: 16
    lora_alpha: 32
    lora_dropout: 0.05
    target_modules: ["q_proj", "k_proj", "v_proj", "o_proj", "gate_proj", "up_proj", "down_proj"]
    bias: "none"
    task_type: "CAUSAL_LM"

data:
  source: "huggingface"
  dataset_name: "tatsu-lab/alpaca"
  split: "train"
  max_samples: 10000
  text_column: "text"
  max_length: 512

training:
  per_device_train_batch_size: 8
  learning_rate: 2.0e-4
  num_train_epochs: 1
  logging_steps: 10
  save_strategy: "epoch"
  report_to: "wandb"
  fp16: false
  bf16: true
  gradient_accumulation_steps: 2
  warmup_ratio: 0.03
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0

evaluation:
  eval_strategy: "steps"
  eval_steps: 100
  test_prompts:
    - "Write a Python function to check if a number is even."
    - "Explain recursion with a real-life example."
    - "What are the key differences between supervised and reinforcement learning?"
    - "Describe the architecture of a transformer model."
  max_new_tokens: 150
  temperature: 0.7
  top_p: 0.9
